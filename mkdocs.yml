site_name: 2WikiMultihopQA-OpenAI
site_description: Documentation for evaluating OpenAI-compatible chat models on a 2WikiMultihopQA benchmark slice.
repo_name: 2WikiMultihopQA-OpenAI
repo_url: https://github.com/leideng/2WikiMultihopQA-OpenAI
docs_dir: docs
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Evaluation Pipeline: evaluation.md
  - Suggested Prompts: prompts.md
  - Datasets: datasets.md
  - CacheBlend Issue Notes: cacheblend-issue.md
  - Results: results.md
  - Full Results:
      - Original 200 / doubao-seed-2.0-pro: results-original-doubao.md
      - Fixed 200 / doubao-seed-2.0-pro: results-fixed-doubao.md
      - Filtered 102 / doubao-seed-2.0-pro: results-filtered-doubao.md
      - Filtered 102 / gpt-5.4: results-filtered-gpt-5.4.md
      - Filtered 102 / claude-opus-4.6: results-filtered-claude-opus-4.6.md
  - Smoke Tests: smoke-tests.md
